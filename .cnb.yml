name: Magene2IGP Sync

on:
  # 手动触发
  manual: true
  # 定时触发：每周一 08:00 北京时间（UTC+8）
  schedule:
    - cron: "0 0 * * 1"

jobs:
  sync:
    runs-on: cnb-ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          LIMIT: ${{ secrets.LIMIT || 5 }}
          DELAY_SEC: ${{ secrets.DELAY_SEC || 2 }}
        run: python main.py
