name: Sync Magene to IGPSPORT
on:
  # 手动触发
  workflow_dispatch:
  # 定时触发（如需启用请取消注释，每周一 8点 北京时间）
  # schedule:
  #   - cron: '0 0 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 超时保护，任务最多运行10分钟
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore synced IDs cache
        uses: actions/cache@v4
        with:
          path: synced_ids.txt
          key: synced-ids-cache

      - name: Run sync script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          LIMIT: ${{ secrets.LIMIT || 5 }}
          DELAY_SEC: ${{ secrets.DELAY_SEC || 2 }}
        run: python main.py
