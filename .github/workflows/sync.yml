name: Sync Magene to IGPSPORT
on:
  # 每天北京时间 6:00 自动执行（UTC 22:00）
  schedule:
    - cron: '0 22 * * *'
  # 手动触发
  workflow_dispatch:
  # Star 仓库触发（跟参考项目一致）
  watch:
    types: [started]

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore synced IDs cache
        uses: actions/cache@v4
        with:
          path: synced_ids.txt
          key: synced-ids-cache

      - name: Run sync script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          LIMIT: ${{ secrets.LIMIT || '5' }}
          DELAY_SEC: ${{ secrets.DELAY_SEC || '2' }}
        run: python main.py
