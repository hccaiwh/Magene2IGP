name: Sync Magene to IGPSPORT

on:
  # 手动触发（自动触发已关闭）
  workflow_dispatch:

  # 定时触发已关闭 - 如需启用请取消注释
  # schedule:
  #   - cron: '0 0 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download synced IDs from previous run
        uses: actions/download-artifact@v4
        with:
          name: synced-ids
          path: .
        continue-on-error: true

      - name: Run sync script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          LIMIT: ${{ secrets.LIMIT || 5 }}
          DELAY_SEC: ${{ secrets.DELAY_SEC || 2 }}
        run: python main.py

      - name: Upload synced IDs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synced-ids
          path: synced_ids.txt
          retention-days: 90
